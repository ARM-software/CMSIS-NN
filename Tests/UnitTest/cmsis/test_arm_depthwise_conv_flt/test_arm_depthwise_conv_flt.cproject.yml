project:
  define:
    - ARM_NN_ENABLE_F32
    - ARM_NN_ENABLE_F16
    - ARM_NN_USE_EXP_LUT

  setups:
    - setup: depthwise-conv-f32
      for-context: .F32+Corstone-300-FVP
      output:
        base-name: test_arm_depthwise_conv_f32

    - setup: depthwise-conv-f16
      for-context: .F16+Corstone-300-FVP
      output:
        base-name: test_arm_depthwise_conv_f16

  groups:
    - group: Unity
      files:
        - file: ../../Unity/src/unity.c

    - group: Depthwise Conv F32 Test
      for-context: .F32+Corstone-300-FVP
      files:
        - file: ../../TestCases/test_arm_depthwise_conv_f32/Unity/unity_test_arm_depthwise_conv_f32.c
        - file: ../../TestCases/test_arm_depthwise_conv_f32/Unity/TestRunner/unity_test_arm_depthwise_conv_f32_runner.c

    - group: Depthwise Conv F16 Test
      for-context: .F16+Corstone-300-FVP
      files:
        - file: ../../TestCases/test_arm_depthwise_conv_f16/Unity/unity_test_arm_depthwise_conv_f16.c
        - file: ../../TestCases/test_arm_depthwise_conv_f16/Unity/TestRunner/unity_test_arm_depthwise_conv_f16_runner.c

  add-path:
    - ../../Unity/src
    - ../../Corstone-300

  components:
    - component: ARM::CMSIS:NN Lib

  layers:
    - layer: ../corstone300_unittest.clayer.yml
