default:
  misc:
    - for-compiler: GCC
      C:
        # Temporary workaround for an Arm GNU 14.3.1 ICE in the float16
        # min/max path on Cortex-M55 until the compiler is fixed upstream.
        - -fdisable-rtl-ce1
        - -fdisable-rtl-ce2
    - for-compiler: CLANG
      C:
        - -std=gnu11
      Link:
        - -Wl,-Map=$elf()$.map
