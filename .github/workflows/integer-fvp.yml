name: CMSIS NN Integer CM55 FVP Regression

on:
  workflow_dispatch:
    inputs:
      tests:
        description: Comma-separated integer test targets to run
        required: false
        default: all
      toolchains:
        description: Comma-separated toolchains to run (no spaces)
        required: false
        default: GCC@14.3.1,AC6@6.24.0
  pull_request:
    branches: [main]
  push:
    branches: [main, cmsis_nn_float]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fvp:
    name: FVP ${{ matrix.toolchain_label }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: gcc
            toolchain: GCC
            toolchain_label: GCC@14.3.1
          - key: ac6
            toolchain: AC6
            toolchain_label: AC6@6.24.0

    env:
      INTEGER_TESTS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tests || 'all' }}
      SELECTED_TOOLCHAINS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.toolchains || 'GCC@14.3.1,AC6@6.24.0' }}
      CMSIS_PACK_ROOT: /home/runner/.cache/arm/packs
      INTEGER_BUILD_ROOT: ${{ github.workspace }}/.ci-tmp/cmsis-nn-integer-fvp

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install termcolor pyserial

      - name: Check toolchain selection
        id: select
        run: |
          if [[ ",${SELECTED_TOOLCHAINS}," == *",${{ matrix.toolchain_label }},"* ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip unselected toolchain
        if: steps.select.outputs.enabled != 'true'
        run: |
          {
            echo "## ${{ matrix.toolchain_label }}"
            echo ""
            echo "Skipped by workflow_dispatch filter."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Install Arm tools
        if: steps.select.outputs.enabled == 'true'
        uses: ARM-software/cmsis-actions/vcpkg@v1

      - name: Activate Arm tool license
        if: steps.select.outputs.enabled == 'true' && matrix.toolchain == 'AC6'
        uses: ARM-software/cmsis-actions/armlm@v1

      - name: Cache CMSIS packs
        if: steps.select.outputs.enabled == 'true'
        uses: actions/cache@v6
        with:
          key: cmsis-packs
          path: /home/runner/.cache/arm/packs

      - name: Install required CMSIS packs
        if: steps.select.outputs.enabled == 'true'
        run: |
          cpackget add "ARM::CMSIS@6.3.0" -R "${CMSIS_PACK_ROOT}" --agree-embedded-license
          cpackget add "ARM::Cortex_DFP@1.1.0" -R "${CMSIS_PACK_ROOT}" --agree-embedded-license

      - name: Export generic toolchain aliases
        if: steps.select.outputs.enabled == 'true'
        run: |
          if [[ -n "${GCC_TOOLCHAIN_14_3_1:-}" ]]; then
            echo "GCC_TOOLCHAIN=${GCC_TOOLCHAIN_14_3_1}" >> "${GITHUB_ENV}"
          fi
          if [[ -n "${AC6_TOOLCHAIN_6_24_0:-}" ]]; then
            echo "AC6_TOOLCHAIN=${AC6_TOOLCHAIN_6_24_0}" >> "${GITHUB_ENV}"
          fi

      - name: Run integer CMSIS/FVP regression
        if: steps.select.outputs.enabled == 'true'
        working-directory: Tests/UnitTest
        run: |
          set +e
          set -o pipefail

          python3 run_integer_unit_tests.py \
            --tests "${INTEGER_TESTS}" \
            --build-fvp \
            --run-fvp \
            --toolchains "${{ matrix.toolchain }}" \
            --jobs 4 \
            --fvp-timeout 120 \
            --cmsis-pack-root "${CMSIS_PACK_ROOT}" \
            --build-root "${INTEGER_BUILD_ROOT}" \
            --fvp-bin FVP_Corstone_SSE-300 \
            --fvp-image-arg=-a | tee integer_fvp.log

          status=${PIPESTATUS[0]}

          {
            echo "## ${{ matrix.toolchain_label }}"
            echo ""
            echo "- Tests: \`${INTEGER_TESTS}\`"
            echo ""
            echo '```text'
            sed -n '/^Integer Unit-Test Summary/,$p' integer_fvp.log
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

          exit "${status}"

      - name: Upload integer FVP logs
        if: always() && steps.select.outputs.enabled == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: integer-fvp-${{ matrix.key }}
          path: |
            Tests/UnitTest/integer_fvp.log
            ${{ env.INTEGER_BUILD_ROOT }}/${{ matrix.key }}/**/*.log
