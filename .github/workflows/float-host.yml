name: CMSIS NN Float Host Regression

on:
  workflow_dispatch:
    inputs:
      tests:
        description: Comma-separated float test families to run
        required: false
        default: all
      dtypes:
        description: Comma-separated dtype list
        required: false
        default: f32,f16
  pull_request:
    branches: [main]
  push:
    branches: [main, cmsis_nn_float]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  host:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Host GCC
            cc: gcc
            cxx: g++
          - name: Host Clang
            cc: clang
            cxx: clang++

    env:
      FLOAT_TESTS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tests || 'all' }}
      FLOAT_DTYPES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dtypes || 'f32,f16' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy termcolor pyserial
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch

      - name: Run float host regression
        working-directory: Tests/UnitTest
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          set +e
          set -o pipefail

          python3 -u run_float_unit_tests.py \
            --tests "${FLOAT_TESTS}" \
            --dtypes "${FLOAT_DTYPES}" \
            --generate \
            --build-host \
            --run-host \
            --clean-host \
            --cmsis-path "${GITHUB_WORKSPACE}" | tee float_host.log

          status=${PIPESTATUS[0]}

          {
            echo "## ${{ matrix.name }}"
            echo ""
            echo "- Tests: \`${FLOAT_TESTS}\`"
            echo "- DTypes: \`${FLOAT_DTYPES}\`"
            echo ""
            echo '```text'
            if grep -q '^Float Unit-Test Summary' float_host.log; then
              sed -n '/^Float Unit-Test Summary/,$p' float_host.log
            else
              cat float_host.log
            fi
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

          exit "${status}"

      - name: Upload float host logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: float-host-${{ matrix.cc }}
          path: |
            Tests/UnitTest/float_host.log
